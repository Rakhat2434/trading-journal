<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="planner.pageTitle">Trading Journal - Weekly Planner</title>
  <meta name="description" content="A simple weekly planner for tasks by day and time." data-i18n-content="planner.metaDescription" />
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">
      <span class="brand-icon">TJ</span>
      <span class="brand-name">TradingJournal</span>
      <span class="brand-tag">v1.0</span>
    </a>
    <div class="navbar-nav">
      <a href="/" class="nav-link" data-i18n="nav.journal">Journal</a>
      <a href="/goals" class="nav-link active" data-i18n="nav.goals">Planner</a>
      <a href="/timer" class="nav-link" data-i18n="nav.timer">Timer</a>
      <a href="/profile" class="nav-link" data-i18n="nav.profile">Profile</a>
      <span id="nav-username" class="nav-username"></span>
      <button id="logout-btn" class="btn btn-ghost nav-logout-btn" type="button" data-i18n="nav.logout">Logout</button>
      <button id="theme-btn" type="button">Dark Terminal</button>
    </div>
  </div>
</nav>

<main class="app-container page-content weekly-planner-page">
  <header class="planner-topbar">
    <div class="planner-title-block">
      <span class="section-eyebrow" data-i18n="planner.kicker">Weekly Planner</span>
      <h1 data-i18n="planner.title">Plan tasks by day and time</h1>
      <p data-i18n="planner.subtitle">Write the next task, choose a day, set the time, and mark it done.</p>
    </div>

    <div class="planner-toolbar">
      <div class="week-controls" aria-label="Week navigation" data-i18n-aria-label="planner.weekNavigation">
        <button id="prev-week-btn" class="btn-icon planner-nav-btn" type="button" aria-label="Previous week" data-i18n-aria-label="planner.previousWeek">&lt;</button>
        <button id="today-week-btn" class="btn btn-ghost btn-sm" type="button" data-i18n="action.today">Today</button>
        <button id="next-week-btn" class="btn-icon planner-nav-btn" type="button" aria-label="Next week" data-i18n-aria-label="planner.nextWeek">&gt;</button>
      </div>
      <button id="open-task-modal-btn" class="btn btn-primary planner-add-btn" type="button" data-i18n="action.addTask">+ Add task</button>
    </div>
  </header>

  <div class="planner-week-strip">
    <span id="week-range-label"></span>
    <span id="week-progress-label"></span>
  </div>

  <div id="loading-state" class="loading-state planner-loading">
    <div class="spinner"></div>
    <span data-i18n="planner.loading">Loading tasks...</span>
  </div>

  <div id="dashboard-error" class="dashboard-error" role="alert" hidden></div>

  <section id="week-planner" class="week-planner" aria-label="Weekly task planner" data-i18n-aria-label="planner.boardLabel"></section>
</main>

<div id="task-modal" class="dashboard-modal planner-modal" hidden>
  <div class="dashboard-modal-backdrop" data-close-task-modal></div>
  <section class="dashboard-drawer planner-drawer" role="dialog" aria-modal="true" aria-labelledby="task-form-title">
    <button class="modal-close-btn dashboard-close-btn" type="button" data-close-task-modal aria-label="Close task form" data-i18n-aria-label="action.close">x</button>
    <div class="drawer-header">
      <span class="section-eyebrow" data-i18n="planner.formKicker">Task</span>
      <h2 id="task-form-title" data-i18n="planner.addTaskTitle">Add task</h2>
      <p data-i18n="planner.formHelp">Only three fields: day, time, and the task text.</p>
    </div>
    <form id="task-form" class="drawer-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="task-day"><span data-i18n="planner.field.day">Day</span> *</label>
        <select id="task-day" class="form-control" required></select>
        <p id="task-day-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="task-time"><span data-i18n="planner.field.time">Time</span> *</label>
        <input type="time" id="task-time" class="form-control" required />
        <p class="field-hint" data-i18n="planner.timeHint">Example: 10:00</p>
        <p id="task-time-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label for="task-text"><span data-i18n="planner.field.taskText">Task text</span> *</label>
        <textarea id="task-text" class="form-control" rows="3" maxlength="200" placeholder="Review the trading plan" data-i18n-placeholder="planner.taskPlaceholder" required></textarea>
        <p class="field-hint" data-i18n="planner.textHint">Keep it short and actionable.</p>
        <p id="task-text-error" class="field-error" aria-live="polite"></p>
      </div>

      <div class="form-actions drawer-actions">
        <button type="submit" id="task-submit-btn" class="btn btn-primary btn-full" data-i18n="planner.addTaskTitle">Add task</button>
        <button type="button" id="task-cancel-btn" class="btn btn-ghost" data-close-task-modal data-i18n="action.cancel">Cancel</button>
      </div>
    </form>
  </section>
</div>

<div id="toast-container" aria-live="polite"></div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/theme.js"></script>
<script src="js/goals.js"></script>
</body>
</html>
