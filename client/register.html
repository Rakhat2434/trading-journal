<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title data-i18n="auth.register.pageTitle">Trading Journal - Register</title>
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      position: relative;
    }
    .auth-top-actions {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      right: 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .auth-theme-btn {
      min-height: 42px;
    }
    .auth-container {
      width: 100%;
      max-width: 460px;
    }
    .auth-card {
      width: 100%;
    }
    .auth-message {
      min-height: 20px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .auth-message.error { color: #d1242f; }
    .auth-message.success { color: #1a7f37; }
    .auth-footer {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body class="auth-page">
  <div class="auth-top-actions">
    <button id="theme-btn" class="auth-theme-btn">Dark Terminal</button>
  </div>

  <main class="auth-container">
    <section class="auth-card panel">
      <div class="panel-header">
        <h2 data-i18n="auth.register.title">Register</h2>
      </div>
      <div class="panel-body">
        <form id="register-form" autocomplete="off">
          <div class="form-group">
            <label for="register-username" data-i18n="field.username">Username</label>
            <input id="register-username" type="text" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="register-email" data-i18n="field.email">Email</label>
            <input id="register-email" type="email" class="form-control" required />
          </div>
          <div class="form-group">
            <label for="register-password" data-i18n="field.password">Password</label>
            <input id="register-password" type="password" class="form-control" minlength="6" required />
          </div>
          <div class="form-group">
            <label for="register-confirm-password" data-i18n="field.confirmPassword">Confirm Password</label>
            <input id="register-confirm-password" type="password" class="form-control" minlength="6" required />
          </div>
          <p id="auth-message" class="auth-message"></p>
          <button id="register-submit-btn" type="submit" class="btn btn-primary btn-full" data-i18n="auth.register.title">Register</button>
        </form>
        <p class="auth-footer"><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="/login.html" data-i18n="auth.login.title">Login</a></p>
      </div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
